<meta charset="utf-8">
<title>부인FC 글도우미</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1B7A43">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.svg">
<style>
  /* ── Airbnb "따뜻한 동네 클럽" 테마 (흰 캔버스 + 잔디 그린 브랜드 컬러) ─── */
  :root {
    color-scheme: light;
    --primary:#1B7A43; --primary-active:#145c33; --primary-soft:rgba(27,122,67,.12);
    --canvas:#ffffff; --ink:#222222; --body:#3f3f3f; --muted:#6a6a6a;
    --hairline:#dddddd; --hairline-soft:#ebebeb; --border-strong:#c1c1c1;
    --surface:#f7f5f2; --surface-strong:#f2f0ec;
    /* 카테고리 아이콘 틴트 */
    --t-green:#1B7A43; --t-green-bg:rgba(27,122,67,.12);
    --t-sky:#2563c9;   --t-sky-bg:rgba(37,99,201,.12);
    --t-amber:#b8791b; --t-amber-bg:rgba(214,158,46,.16);
    --t-rose:#d6335a;  --t-rose-bg:rgba(224,60,90,.12);
    --shadow-card:0 6px 20px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.05);
    --shadow-fab:0 10px 28px rgba(27,122,67,.34);
    --r-lg:20px; --r-md:14px; --r-sm:12px; --pill:9999px;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html { background:var(--canvas); }
  body {
    margin:0; color:var(--body); background:var(--canvas);
    font-family:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","맑은 고딕",sans-serif;
    font-size:19px; line-height:1.5; -webkit-text-size-adjust:100%;
    font-feature-settings:"kern" 1;
    min-height:100vh;
  }
  .app { max-width:560px; margin:0 auto; padding:8px 18px 150px; min-height:100vh; }

  svg.i { display:block; }

  /* 소문자 태그 라벨 (Airbnb micro-label) */
  .eyebrow {
    font-size:13px; font-weight:700; letter-spacing:.02em;
    color:var(--primary); margin:4px 0 10px;
  }

  /* 상단바 */
  .topbar { display:flex; align-items:center; gap:12px; padding:16px 0 18px; margin-bottom:8px; }
  .topbar .logo {
    width:46px; height:46px; border-radius:15px; flex:none;
    background:var(--primary); color:#fff;
    display:flex; align-items:center; justify-content:center;
    box-shadow:var(--shadow-card);
  }
  .topbar h1 { font-size:21px; margin:0; color:var(--ink); letter-spacing:-.01em; font-weight:700; }
  .topbar .role { font-size:13px; color:var(--muted); margin:2px 0 0; }
  .topbar .spacer { flex:1; }
  .iconbtn {
    width:46px; height:46px; border-radius:999px; border:1px solid var(--border-strong);
    background:var(--canvas); color:var(--ink); cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }

  h2.q { font-size:28px; margin:8px 0 8px; line-height:1.25; font-weight:700; color:var(--ink); letter-spacing:-.01em; text-wrap:balance; }
  h2.q em { font-style:normal; color:var(--primary); }
  p.hint { color:var(--muted); font-size:15.5px; margin:0 0 20px; }

  /* 진행바 */
  .progress { display:flex; gap:6px; margin:2px 0 22px; }
  .progress i { flex:1; height:6px; border-radius:999px; background:var(--hairline-soft); }
  .progress i.on { background:var(--primary); }

  /* 버튼 공통 = 부드러운 흰 카드 (Airbnb 프로퍼티 카드) */
  .bigbtn {
    display:flex; align-items:center; gap:15px; width:100%;
    background:var(--canvas); border:1px solid var(--hairline-soft); border-radius:var(--r-lg);
    padding:17px 18px; margin-bottom:14px; cursor:pointer; text-align:left;
    font-family:inherit; font-size:19px; font-weight:600; color:var(--ink);
    min-height:72px; transition:transform .12s ease, box-shadow .15s ease;
    box-shadow:var(--shadow-card);
  }
  .bigbtn:hover { transform:translateY(-1px); box-shadow:0 10px 26px rgba(0,0,0,.09), 0 2px 6px rgba(0,0,0,.05); }
  .bigbtn:active { transform:scale(.99); }
  .bigbtn .ic {
    width:48px; height:48px; border-radius:999px; flex:none;
    background:var(--surface-strong); color:var(--ink);
    display:flex; align-items:center; justify-content:center;
  }
  .bigbtn small { display:block; font-weight:400; font-size:14px; color:var(--muted); margin-top:3px; }

  /* 카테고리별 아이콘 틴트 (카드는 흰색 유지) */
  .bigbtn.blk-lime  .ic { background:var(--t-green-bg); color:var(--t-green); }
  .bigbtn.blk-lilac .ic { background:var(--t-sky-bg);   color:var(--t-sky); }
  .bigbtn.blk-cream .ic { background:var(--t-amber-bg); color:var(--t-amber); }
  .bigbtn.blk-coral .ic { background:var(--t-rose-bg);  color:var(--t-rose); }
  .bigbtn.blk-mint  .ic { background:var(--t-green-bg); color:var(--t-green); }

  /* 그린 주버튼 (Airbnb primary) */
  .bigbtn.primary {
    background:var(--primary); border-color:var(--primary); color:#fff; border-radius:var(--r-sm);
    min-height:58px; justify-content:center; font-weight:600; box-shadow:0 6px 18px rgba(27,122,67,.24);
  }
  .bigbtn.primary:hover { transform:translateY(-1px); box-shadow:0 10px 24px rgba(27,122,67,.30); }
  .bigbtn.primary .ic { background:rgba(255,255,255,.20); color:#fff; }
  .bigbtn.primary small { color:rgba(255,255,255,.80); }
  .bigbtn.outline {
    background:var(--canvas); border:1.5px solid var(--ink); border-radius:var(--r-sm);
    min-height:58px; justify-content:center; box-shadow:none;
  }
  .bigbtn.outline:hover { background:var(--surface); transform:translateY(-1px); box-shadow:none; }
  .bigbtn.outline .ic { background:var(--surface-strong); }
  .bigbtn.flash { outline:3px solid var(--primary); outline-offset:2px; }

  /* 텍스트 입력 */
  .field {
    width:100%; font-family:inherit; font-size:19px; color:var(--ink);
    background:var(--canvas); border:1px solid var(--border-strong); border-radius:var(--r-md);
    padding:15px 16px; margin-bottom:12px;
  }
  .field::placeholder { color:var(--muted); }
  .field:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-soft); }
  select.field option { background:#fff; color:var(--ink); }

  /* 미리보기 탭 = 언더라인 탭 (Airbnb) */
  .tabs { display:flex; gap:0; margin-bottom:16px; border-bottom:1px solid var(--hairline); }
  .tab {
    flex:0 0 auto; margin-right:26px; padding:12px 2px 13px; border:none; background:none;
    border-bottom:2.5px solid transparent; margin-bottom:-1px;
    color:var(--muted); font-family:inherit; font-size:17px; font-weight:600; cursor:pointer;
  }
  .tab.on { color:var(--ink); border-bottom-color:var(--primary); }
  .preview {
    background:var(--surface); border:1px solid var(--hairline-soft); border-radius:var(--r-lg);
    padding:20px; white-space:pre-wrap; font-size:18px; line-height:1.75; color:var(--body);
    margin-bottom:16px; word-break:break-word; box-shadow:var(--shadow-card);
  }

  /* 인식 토스트 */
  .heard {
    position:fixed; left:50%; transform:translateX(-50%); bottom:120px;
    max-width:86%; background:var(--ink); color:#fff; font-weight:600;
    padding:10px 20px; border-radius:999px; font-size:15px;
    opacity:0; transition:opacity .2s; pointer-events:none; z-index:60;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; box-shadow:0 8px 24px rgba(0,0,0,.22);
  }
  .heard.show { opacity:1; }

  /* 마이크 FAB (Airbnb 서치 오브) */
  .micbar {
    position:fixed; left:0; right:0; bottom:0; z-index:50;
    display:flex; justify-content:center; padding:0 0 22px;
    background:linear-gradient(transparent, rgba(255,255,255,.96) 55%);
    pointer-events:none;
  }
  .micfab {
    pointer-events:auto; width:80px; height:80px; border-radius:50%;
    border:none; cursor:pointer;
    background:var(--primary); color:#fff;
    display:flex; align-items:center; justify-content:center; position:relative;
    box-shadow:var(--shadow-fab);
  }
  .micfab.off { background:var(--surface-strong); color:#8a8a8a; border:1px solid var(--hairline); box-shadow:0 6px 16px rgba(0,0,0,.10); }
  .micfab .pulse {
    position:absolute; inset:0; border-radius:50%; border:3px solid var(--primary);
    opacity:0; pointer-events:none;
  }
  @media (prefers-reduced-motion: no-preference) {
    .micfab.on .pulse { animation:pulse 1.6s ease-out infinite; }
    @keyframes pulse { 0%{transform:scale(1);opacity:.55} 100%{transform:scale(1.6);opacity:0} }
  }
  .miclabel {
    position:fixed; left:50%; transform:translateX(-50%); bottom:6px; z-index:51;
    font-size:12.5px; color:var(--muted); pointer-events:none; white-space:nowrap;
  }

  /* 홈 그리팅 */
  .greet { font-size:32px; font-weight:700; color:var(--ink); letter-spacing:-.01em; line-height:1.22; margin:2px 0 6px; }
  .greet em { font-style:normal; color:var(--primary); }
  .greet-sub { color:var(--muted); font-size:14.5px; margin:0 0 24px; }

  /* 설정 */
  .set-item { background:var(--canvas); border:1px solid var(--hairline-soft); border-radius:var(--r-md); padding:16px 18px; margin-bottom:12px; box-shadow:var(--shadow-card); }
  .set-item label { display:block; font-weight:700; font-size:16px; color:var(--ink); margin-bottom:8px; }
  .set-item .desc { font-size:14px; color:var(--muted); margin:6px 0 0; }

  .backrow { margin-top:8px; display:flex; gap:6px; }
  .ghost {
    background:none; border:none; color:var(--muted); font-family:inherit;
    font-size:16px; padding:12px 6px; cursor:pointer; font-weight:600;
  }
  :focus-visible { outline:3px solid var(--primary); outline-offset:2px; }
</style>

<div class="app">
  <div class="topbar">
    <div class="logo">
      <svg class="i" width="27" height="27" viewBox="0 0 120 120" fill="none">
        <circle cx="60" cy="46" r="19" stroke="currentColor" stroke-width="9"/>
        <path d="M60 36l9 6.5-3.4 10.6H54.4L51 42.5z" fill="currentColor"/>
        <path d="M37 52c0 15 10 25 23 25s23-10 23-25M60 77v14M46 94h28" stroke="currentColor" stroke-width="9" stroke-linecap="round"/>
      </svg>
    </div>
    <div>
      <h1>부인FC 글도우미</h1>
      <p class="role" id="roleLabel"></p>
    </div>
    <div class="spacer"></div>
    <button class="iconbtn" id="btnSettings" data-voice="설정" aria-label="설정">
      <svg class="i" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3.2"/>
        <path d="M19 12a7 7 0 0 0-.1-1.2l2-1.5-2-3.4-2.3 1a7 7 0 0 0-2-1.2L14.2 3H9.8L9.4 5.7a7 7 0 0 0-2 1.2l-2.3-1-2 3.4 2 1.5A7 7 0 0 0 5 12c0 .4 0 .8.1 1.2l-2 1.5 2 3.4 2.3-1a7 7 0 0 0 2 1.2l.4 2.7h4.4l.4-2.7a7 7 0 0 0 2-1.2l2.3 1 2-3.4-2-1.5c.1-.4.1-.8.1-1.2z"/>
      </svg>
    </button>
  </div>
  <div id="screen"></div>
</div>

<div class="heard" id="heard"></div>
<div class="micbar">
  <button class="micfab off" id="micFab" aria-label="음성 인식 켜기/끄기">
    <span class="pulse"></span>
    <svg class="i" width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
      <rect x="9" y="3" width="6" height="11" rx="3"/>
      <path d="M5.5 11a6.5 6.5 0 0 0 13 0M12 17.5V21M8.5 21h7"/>
    </svg>
  </button>
</div>
<div class="miclabel" id="micLabel">마이크를 눌러 음성으로 시작하세요</div>

<script>
"use strict";
/* ================= SVG 아이콘 (currentColor로 버튼 색 상속) ================= */
const ICONS = {
  ball:  `<svg class="i" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7.5l4 3-1.5 4.8h-5L8 10.5z"/></svg>`,
  rain:  `<svg class="i" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 15a5 5 0 1 1 1-9.9A6 6 0 0 1 19.5 8 4.5 4.5 0 0 1 18 15z"/><path d="M9 18l-1 2.5M13 18l-1 2.5M17 18l-1 2.5"/></svg>`,
  food:  `<svg class="i" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 11h16l-1.5 8h-13z"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>`,
  vote:  `<svg class="i" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="9" width="16" height="11" rx="2"/><path d="M9 9V6.5A2.5 2.5 0 0 1 11.5 4h1A2.5 2.5 0 0 1 15 6.5V9M9.5 14.5l2 2 3.5-3.5"/></svg>`,
  doc:   `<svg class="i" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 3h7l4 4v14H7z"/><path d="M14 3v4h4M10 12h5M10 16h5"/></svg>`,
  copy:  `<svg class="i" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2"/></svg>`,
  share: `<svg class="i" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="6" cy="12" r="2.5"/><circle cx="17.5" cy="5.5" r="2.5"/><circle cx="17.5" cy="18.5" r="2.5"/><path d="M8.3 10.8l7-4M8.3 13.2l7 4"/></svg>`,
  sound: `<svg class="i" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4 9v6h4l5 4V5L8 9z"/><path d="M16.5 8.5a5 5 0 0 1 0 7M19 6a8.5 8.5 0 0 1 0 12"/></svg>`,
  check: `<svg class="i" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M4 12.5l5.5 5.5L20 7"/></svg>`,
  save:  `<svg class="i" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M5 4h11l3 3v13H5z"/><path d="M8 4v5h7V4M8 14h8v6H8z"/></svg>`,
};

/* ================= 설정 ================= */
const store = {
  get k() { return JSON.parse(localStorage.getItem("buinfc") || "{}"); },
  set k(v) { localStorage.setItem("buinfc", JSON.stringify(v)); }
};
const defaults = {
  wake: "부축아",
  wakeRequired: false,     // MVP 기본: 마이크 켜면 바로 명령 인식
  tts: true,
  signer: "총무 임명호",
};
let cfg = Object.assign({}, defaults, store.k);
function saveCfg() { store.k = cfg; renderRole(); }
function renderRole() { document.getElementById("roleLabel").textContent = cfg.signer + " · 호출부호 " + cfg.wake; }

/* ================= 유틸 ================= */
const $ = s => document.querySelector(s);
const screenEl = $("#screen");
function el(html) { const t = document.createElement("template"); t.innerHTML = html.trim(); return t.content.firstChild; }
function fmtDate(d) {
  const days = ["일","월","화","수","목","금","토"];
  return (d.getMonth()+1) + "월 " + d.getDate() + "일 " + days[d.getDay()] + "요일";
}
function nextSunday(weeks) {
  const d = new Date();
  const add = (7 - d.getDay()) % 7 || 7;   // 오늘이 일요일이면 다음 일요일
  d.setDate(d.getDate() + add + (weeks||0)*7);
  return d;
}
function daysToSunday() { return (7 - new Date().getDay()) % 7; } // 0 = 오늘이 일요일
function toast(msg) {
  const h = $("#heard"); h.textContent = msg; h.classList.add("show");
  clearTimeout(toast._t); toast._t = setTimeout(()=>h.classList.remove("show"), 2600);
}

/* ================= TTS ================= */
function speak(text) {
  if (!cfg.tts || !("speechSynthesis" in window)) return;
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "ko-KR"; u.rate = 0.95;
    speechSynthesis.speak(u);
  } catch(e) {}
}

/* ================= 템플릿 생성 ================= */
function sign() { return cfg.signer ? "\n\n" + cfg.signer : ""; }

const generators = {
  match(a) {
    const band =
`[ 축구경기 ] ${a.date} ${a.place} 자체경기

■ 시간 : ${a.time}
■ 장소 : ${a.place}
■ 개인 조끼 꼭 가지고 나오세요.
■ 개인 보호장비 꼭 준비하시기 바랍니다.
■ 경기 시작 30분 전까지 나오시기 바랍니다.

일정 확인 후 참석 투표 부탁드립니다.${sign()}`;
    const talk =
`◆ ${a.date} 운동 안내입니다 ◆
장소: ${a.place} / 시간: ${a.time}
꼭 시간 확인하셔서 함께해 주시면 감사하겠습니다.
밴드에서 참석 투표 부탁드립니다~`;
    return { band, talk };
  },
  rain(a) {
    const gear = a.plan.includes("족구")
      ? "족구화 또는 운동화 준비하시기 바랍니다. (족구장에서 축구화 절대 불가)"
      : "운동화와 개인 보호장비 챙겨 주시기 바랍니다.";
    const band =
`긴급공지

비 소식으로 운동장 사정이 좋지 않을 수 있어
${a.plan} 준비해 놓았습니다.
일단 ${a.gather}까지 학교로 오셔서 상황을 보고
운동 진행하도록 하겠습니다.
${gear}

내일 뵙겠습니다.${sign()}`;
    const talk =
`⚠️ 긴급공지 ⚠️
비 예보로 내일 운동 변경될 수 있습니다.
${a.plan} 준비해 두었으니
${a.gather}까지 일단 학교로 와 주세요.
${gear}`;
    return { band, talk };
  },
  event(a) {
    const sponsor = a.sponsor === "받지 않음"
      ? "찬조를 받지 않습니다. 부담 갖지 마시고 마음껏 드세요."
      : "행사를 위해 찬조해 주실 분은 총무에게 연락 주시면 감사하겠습니다.";
    const band =
`부인FC 회원님들과 고문님들께
가내에 행복과 건강이 늘 함께하시기 바랍니다.

${a.date} ${a.time} ${a.name}는 ${a.place}에서 합니다.
${sponsor}
많은 분들 참석 부탁드립니다.

참석 여부는 밴드 투표로 알려 주시기 바랍니다.${sign()}`;
    const talk =
`📢 ${a.name} 안내
${a.date} ${a.time}, ${a.place}입니다.
${sponsor}
참석·불참은 밴드 투표에 부탁드립니다~
많은 분들 참석 부탁드립니다!`;
    return { band, talk };
  },
  nudge(a) {
    const n = a.count && a.count !== "건너뛰기" ? a.count.trim().replace(/\s*[명분]+\s*$/,"") : "";
    let band, talk;
    if (a.tone === "유머") {
      talk =
`아직 참석 투표 고민하고 계신 분들~
그리 어려운 숙제도 아닌데 빨리 밀린 숙제 끝내시고
맘 편안히 주말 보내자구요~~ㅋ
${n ? "아직 안 하신 분 " + n + "분입니다! " : ""}${a.deadline}까지 투표 부탁드립니다.
운동장에서 뵙겠습니다~`;
      band = `${a.target} 참석 투표가 진행 중입니다.
${n ? "아직 " + n + "분이 투표 전입니다. " : ""}${a.deadline}까지 참석 여부 투표 부탁드립니다.
많은 참여 부탁드립니다~${sign()}`;
    } else {
      band =
`${a.target} 참석 여부 투표 안내입니다.
${n ? "아직 참석 여부를 알려주지 않으신 분이 " + n + "분 계십니다.\n" : ""}행사 준비를 위해 ${a.deadline}까지 밴드에서 투표해 주시면
준비에 큰 도움이 되겠습니다. 감사합니다.${sign()}`;
      talk =
`${a.target} 참석 투표, ${a.deadline}까지입니다.
${n ? "아직 안 하신 분 " + n + "분! " : ""}밴드에서 꼭 투표 부탁드립니다~`;
    }
    return { band, talk };
  }
};

/* ================= 화면 상태 ================= */
let state = { screen:"home", flow:null, stepIdx:0, answers:{}, result:null, tab:"band", textMode:false };

function go(screen) { state.screen = screen; render(); }

function startFlow(flowKey) {
  const defs = flowDefs();
  state.flow = defs[flowKey]; state.flowKey = flowKey;
  state.stepIdx = 0; state.answers = {}; state.textMode = false;
  go("wizard");
}
function currentStep() { return state.flow.steps[state.stepIdx]; }
function answer(value) {
  const st = currentStep();
  if (value === "__text__") { state.textMode = true; render(); return; }
  state.answers[st.key] = value;
  state.textMode = false;
  if (state.stepIdx < state.flow.steps.length - 1) { state.stepIdx++; render(); }
  else {
    state.result = generators[state.flow.gen](state.answers);
    state.tab = "band";
    go("preview");
    speak("글이 완성되었습니다. 밴드용과 카톡용을 확인해 주세요. 복사 눌러줘, 라고 말씀하시면 복사됩니다.");
  }
}
function backStep() {
  if (state.textMode) { state.textMode = false; render(); return; }
  if (state.stepIdx > 0) { state.stepIdx--; render(); } else go("home");
}

/* ================= 렌더링 ================= */
function render() {
  screenEl.innerHTML = "";
  if (state.screen === "home") renderHome();
  else if (state.screen === "wizard") renderWizard();
  else if (state.screen === "preview") renderPreview();
  else if (state.screen === "settings") renderSettings();
}

function bigBtn({icon, label, sub, voice, cls, block, onClick}) {
  const b = el(`<button class="bigbtn ${cls||""} ${block?("blk-"+block):""}" data-voice="${voice||label}">
    ${icon?`<span class="ic">${ICONS[icon]||""}</span>`:""}<span>${label}${sub?`<small>${sub}</small>`:""}</span></button>`);
  b.addEventListener("click", onClick);
  return b;
}

function renderHome() {
  const d = daysToSunday();
  const greet = d === 0
    ? `오늘은 <em>경기 날</em>입니다!`
    : `일요일 킥오프까지 <em>D-${d}</em>`;
  screenEl.appendChild(el(`<p class="eyebrow">BUIN FC · 공지 도우미</p>`));
  screenEl.appendChild(el(`<div class="greet">${greet}</div>`));
  screenEl.appendChild(el(`<p class="greet-sub">${fmtDate(nextSunday(0))} · 버튼을 누르거나 "경기 공지 눌러줘"라고 말씀하세요</p>`));
  const menu = [
    { icon:"ball", label:"경기 공지", sub:"자체경기 일정 + 준비물 안내", voice:"경기 공지|경기|운동 공지", key:"match", block:"lime" },
    { icon:"rain", label:"우천 변경", sub:"비 올 때 장소·시간 변경 긴급공지", voice:"우천 변경|우천|긴급", key:"rain", block:"lilac" },
    { icon:"food", label:"행사 안내", sub:"초복·창립·송년회 회식 안내", voice:"행사 안내|행사|회식", key:"event", block:"cream" },
    { icon:"vote", label:"투표 독려", sub:"참석 투표 안 하신 분들께 재촉", voice:"투표 독려|투표|독려", key:"nudge", block:"coral" },
  ];
  menu.forEach(m => screenEl.appendChild(bigBtn({...m, onClick:()=>{ speak(m.label + "를 시작할게요."); startFlow(m.key); }})));
  if (state.lastResult) {
    screenEl.appendChild(bigBtn({ icon:"doc", label:"마지막 글 다시 보기", voice:"다시 보기|마지막 글",
      onClick:()=>{ state.result = state.lastResult; go("preview"); } }));
  }
}

function renderWizard() {
  const st = currentStep();
  const total = state.flow.steps.length;
  let bars = "";
  for (let i=0;i<total;i++) bars += `<i class="${i<=state.stepIdx?"on":""}"></i>`;
  screenEl.appendChild(el(`<p class="eyebrow">${state.flow.title} · STEP ${state.stepIdx+1}/${total}</p>`));
  screenEl.appendChild(el(`<div class="progress">${bars}</div>`));
  screenEl.appendChild(el(`<h2 class="q">${st.q}</h2>`));

  const needText = st.type === "text" || state.textMode;
  if (needText) {
    screenEl.appendChild(el(`<p class="hint">${st.textPrompt || "말씀하시거나 입력해 주세요."} — 말하면 자동으로 입력됩니다.</p>`));
    const input = el(`<input class="field" id="dictation" placeholder="여기에 입력..." autocomplete="off">`);
    screenEl.appendChild(input);
    screenEl.appendChild(bigBtn({ icon:"check", label:"입력 완료", cls:"primary", voice:"입력 완료|완료|다음",
      onClick:()=>{ const v = input.value.trim(); if(!v){ toast("내용을 입력해 주세요"); speak("내용을 말씀해 주세요"); return; } answer(v); } }));
    setTimeout(()=>{ try{ input.focus({preventScroll:true}); }catch(e){} }, 50);
  } else {
    st.opts.forEach(o => screenEl.appendChild(
      bigBtn({ label:o.label, sub:o.sub, voice:[o.label].concat(o.voice||[]).join("|"),
        onClick:()=>{ answer(o.value); } })));
  }
  const back = el(`<div class="backrow"><button class="ghost" data-voice="뒤로">← 뒤로</button>
    <button class="ghost" data-voice="처음|처음으로|홈">⌂ 처음으로</button></div>`);
  back.children[0].addEventListener("click", backStep);
  back.children[1].addEventListener("click", ()=>go("home"));
  screenEl.appendChild(back);
  if (voiceOn) speak(st.q);
}

function renderPreview() {
  state.lastResult = state.result;
  screenEl.appendChild(el(`<p class="eyebrow">미리보기 · 복사해서 붙여넣기</p>`));
  screenEl.appendChild(el(`<h2 class="q">글이 <em>완성</em>됐어요</h2>`));
  screenEl.appendChild(el(`<p class="hint">"복사 눌러줘" → 밴드/카톡에 붙여넣으세요. "카톡용 눌러줘"로 전환됩니다.</p>`));
  const tabs = el(`<div class="tabs">
    <button class="tab ${state.tab==="band"?"on":""}" data-voice="밴드용|밴드">밴드용 (공식)</button>
    <button class="tab ${state.tab==="talk"?"on":""}" data-voice="카톡용|카톡">카톡용 (전파)</button></div>`);
  tabs.children[0].addEventListener("click", ()=>{ state.tab="band"; render(); });
  tabs.children[1].addEventListener("click", ()=>{ state.tab="talk"; render(); });
  screenEl.appendChild(tabs);
  const text = state.tab==="band" ? state.result.band : state.result.talk;
  screenEl.appendChild(el(`<div class="preview" id="previewText">${text.replace(/&/g,"&amp;").replace(/</g,"&lt;")}</div>`));

  screenEl.appendChild(bigBtn({ icon:"copy", label:"복사", sub:"복사 후 밴드·카톡에 붙여넣기", cls:"primary", voice:"복사",
    onClick: async ()=>{
      try { await navigator.clipboard.writeText(text); }
      catch(e) {
        const ta = document.createElement("textarea"); ta.value = text;
        document.body.appendChild(ta); ta.select(); document.execCommand("copy"); ta.remove();
      }
      toast("복사했어요! 밴드/카톡에 붙여넣으세요"); speak("복사했어요. 밴드나 카톡에 붙여넣어 주세요.");
    }}));
  if (navigator.share) {
    screenEl.appendChild(bigBtn({ icon:"share", label:"공유", sub:"밴드·카톡 앱으로 바로 보내기", cls:"outline", voice:"공유",
      onClick:()=>{ navigator.share({ text }).catch(()=>{}); } }));
  }
  screenEl.appendChild(bigBtn({ icon:"sound", label:"읽어줘", sub:"완성된 글을 소리로 확인", voice:"읽어줘|말해줘",
    onClick:()=>speak(text) }));
  const back = el(`<div class="backrow"><button class="ghost" data-voice="다시 만들기|다시">↺ 다시 만들기</button>
    <button class="ghost" data-voice="처음|처음으로|홈">⌂ 처음으로</button></div>`);
  back.children[0].addEventListener("click", ()=>{ state.stepIdx=0; state.answers={}; state.textMode=false; go("wizard"); });
  back.children[1].addEventListener("click", ()=>go("home"));
  screenEl.appendChild(back);
}

    : "마이크를 눌러 음성으로 시작하세요";
}

function startRec() {
  if (!SR) { toast("이 브라우저는 음성 인식을 지원하지 않아요 (크롬 권장)"); return; }
  try {
    rec = new SR();
    rec.lang = "ko-KR"; rec.continuous = true; rec.interimResults = false;
    rec.onresult = (e) => {
      const said = e.results[e.results.length-1][0].transcript.trim();
      if (said) handleSpeech(said);
    };
    rec.onerror = (e) => {
      if (e.error === "not-allowed" || e.error === "service-not-allowed") {
        setMic(false); toast("마이크 권한을 허용해 주세요");
      }
    };
    rec.onend = () => { if (voiceOn) { try { rec.start(); } catch(e){} } };
    rec.start();
    setMic(true);
    speak(cfg.wakeRequired ? "마이크를 켰어요. " + cfg.wake + ", 하고 불러 주세요." : "듣고 있어요. 경기 공지 눌러줘, 처럼 말씀하세요.");
  } catch(e) { toast("음성 인식을 시작할 수 없어요"); }
}
function stopRec() { voiceOn = false; try { rec && rec.stop(); } catch(e){} setMic(false); speechSynthesis && speechSynthesis.cancel(); }

$("#micFab").addEventListener("click", ()=> voiceOn ? stopRec() : startRec());

function visibleVoiceButtons() {
  return Array.from(document.querySelectorAll("[data-voice]")).filter(b => b.offsetParent !== null);
}

function handleSpeech(saidRaw) {
  toast("🎙 " + saidRaw);
  let said = saidRaw;
  const wake = norm(cfg.wake);
  const nsaid = norm(said);

  // 호출부호 처리
  if (wake && nsaid.startsWith(wake)) {
    said = said.replace(new RegExp("^\\s*" + cfg.wake.split("").join("\\s*")), "").replace(/^[,\s]+/,"");
    if (!norm(said)) { armed = true; speak("네, 말씀하세요."); return; }
  } else if (cfg.wakeRequired && !armed) {
    return; // 호출부호 필수 모드: 부르기 전에는 무시
  }
  armed = false;

  // 명령 문법: {라벨} + 눌러줘/눌러 줘/클릭/선택
  const m = said.match(/^(.*?)(눌러\s*줘|눌러|클릭|선택|선택해\s*줘)\.?$/);
  if (m && m[1].trim()) {
    const target = norm(m[1]);
    const btns = visibleVoiceButtons();
    let best = null, bestScore = 0;
    for (const b of btns) {
      for (const alias of b.dataset.voice.split("|")) {
        const na = norm(alias);
        if (!na) continue;
        let score = 0;
        if (target === na) score = 1000 + na.length;                 // 정확히 일치
        else if (target.includes(na)) score = 500 + na.length;       // 발화가 별칭을 포함
        else if (na.includes(target)) score = 100 - (na.length - target.length); // 별칭이 발화를 포함: 길이차 적을수록
        if (score > bestScore) { best = b; bestScore = score; }
      }
    }
    if (best) {
      best.classList.add("flash");
      setTimeout(()=>best.classList.remove("flash"), 600);
      best.click();
      return;
    }
    speak("찾지 못했어요. 화면의 버튼 이름을 말씀해 주세요.");
    return;
  }

  // 마이크 제어
  if (/마이크.*(꺼|끄)/.test(said)) { stopRec(); return; }

  // 받아쓰기: 입력창이 열려 있으면 답으로 처리
  const input = document.getElementById("dictation");
  if (input) {
    input.value = said.replace(/\.$/,"");
    speak("입력했어요. 맞으면 입력 완료 눌러줘, 라고 하세요.");
    return;
  }

  // 선택지 화면: 버튼 별칭과 직접 매칭 (눌러줘 없이도)
  if (state.screen === "wizard") {
    const btns = visibleVoiceButtons();
    for (const b of btns) {
      for (const alias of b.dataset.voice.split("|")) {
        const na = norm(alias);
        if (na && na.length >= 2 && (nsaid === na || nsaid.includes(na))) { b.click(); return; }
      }
    }
    speak("다시 한번 말씀해 주세요.");
  }
}

/* ================= 시작 ================= */
$("#btnSettings").addEventListener("click", ()=>go("settings"));
renderRole();
render();
if (!SR) toast("음성 인식은 안드로이드 크롬에서 가장 잘 됩니다");
</script>
